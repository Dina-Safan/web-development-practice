<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Operation</title>

  <!-- font  -->
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Gveret+Levin&display=swap');
    </style>
  <!-- bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- my style file  -->
    <link rel="stylesheet" href="./crud.css">
</head>
<body>

<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <h1 class="navbar-brand w-25">Skincare</h1>
    <div class="d-flex ">
        <form class="d-flex " role="search"  >
      <input id="seacrhInput" class="form-control  me-2" type="search" placeholder="Search" aria-label="Search"/>
    </form>
    <button id="showAddedModalBtn" class="btn btn-success add-btn " type="button" >Add Product</button>
    </div>
    
  </div>
</nav>

<main>
    <div class="container mx-auto">
        <h2 class="text-center my-3">All Skincare Products</h2>

        <section class="products">
            <div class="row g-3 products-container">
                
     
           
            </div>

        </section>
    </div>
</main>

<section class="model position-fixed w-100 h-100 top-0 end-0 overflow-auto d-none">
    <h2 id="hAdd" class="d-flex d-block  justify-content-center align-items-center mt-3 mb-4"> <span style="color: var(--dark-color);"> Add New </span>  Product</h2>
    <h2 id="hUpdate" class="d-flex  justify-content-center align-items-center mt-3 mb-4 d-none"><span style="color: var(--dark-color);"> Edit </span>  Product</h2>
    <div class="container d-flex  justify-content-center align-items-center w-100  ">
        <div class="form w-50 mb-5  py-4 px-3 rounded" style="background-color: white;">
        <div class="mb-3">
            <input type="text" class="form-control" id="productNameInput" placeholder="Product Name">
             <p class="danger">Contains letters and spaces only, minimum length 3</p>
        </div>
       
        <div class="mb-3">
            <input list="categories" type="text" class="form-control" id="productCategoryInput" placeholder="Product Category">
             <p class="danger">Contains letters and spaces only, minimum length 3</p>
        </div>
        <datalist id="categories">
            <option value="Body Wash">Body Wash</option>
            <option value="Moisturizer">Moisturizer</option>
            <option value="Sunscreen">Sunscreen</option>
            <option value="Vitamin C Serum">Vitamin C Se</option>
            <option value="Lip Balm">Lip Balm</option>
            <option value="Sheet Mask">Sheet Mask</option>
        </datalist>

        <div class="mb-3">
            <input  type="number" class="form-control" id="productPriceInput" placeholder="Product Price..$">
            <p class="danger">Number between 50 and 1000 $</p>
        </div>

        <div class="mb-3">
            <input  type="number" class="form-control" id="productSizeInput" placeholder="Product Size..ml">
            <p class="danger">Numeric, 50ml or more (e.g., 50ml, 100ml)</p>
        </div>

        <div class="mb-3">
            <input list="scents"  type="text" class="form-control" id="productScentInput" placeholder="Product Scent">
            <p class="danger">Contains letters and spaces only, minimum length 3</p>
        </div>
        <datalist id="scents">
            <option value="Lavender">Lavender</option>
            <option value="Rose Floral">Rose Floral</option>
            <option value="Fragrance-Free">Fragrance-Free</option>
            <option value="Jasmie">Jasmie</option>
            <option value="Citrus Fresh">Citrus Fresh</option>
            <option value="Sweet Cranberry">Sweet Cranberry</option>
        </datalist>

         <div class="mb-3">
            <input  type="file" class="form-control" id="productImageInput" accept="images/*">
        </div>



        <button class="btn btn-warning w-100 d-none" type="button" id="updateBtn"> Update</button>
        <button class="btn btn-success w-100 add-btn" type="button" id="AddBtn">Add Product</button>
        </div>
    </div>
</section>

    <script src="./crud.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
