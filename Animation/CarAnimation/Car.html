<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Animation</title>
    <style>

        body{
            margin: 0;
        }
        .road{
            background-image: url("./road.jpg");
            height: 200px;
            display: flex;
            align-items: center;
            overflow: hidden;

            img{
                display: block;
                width: 250px;
                 position: relative;
                 animation: move 4s infinite linear;
                
                
            }
        }

        @keyframes move{
            0%{
                left:0%
            }
            49%{
                transform: rotateY(0deg);

            }
            50%{
                left:83%;
                transform: rotateY(180deg);
            }

            100%{
                left:0%;
                 transform: rotateY(180deg);

            }

        }
    </style>
</head>
<body>
    <div class="road">
            <img src="./car.png" alt="">
    </div>
    
</body>
</html>
